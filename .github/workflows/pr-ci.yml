name: PR CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate content
        run: npm run content:validate

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_SITE_ID: ${{ vars.VITE_API_SITE_ID }}

      - name: Test
        run: npm run test
