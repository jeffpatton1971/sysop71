name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate content
        run: npm run content:validate

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_SITE_ID: ${{ vars.VITE_API_SITE_ID }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend web app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ vars.AZURE_WEBAPP_RESOURCE_GROUP }}
          package: .

      - name: Upload generated content
        run: |
          az storage blob upload-batch \
            --auth-mode login \
            --destination "${{ vars.CONTENT_STORAGE_CONTAINER }}" \
            --source public/content \
            --destination-path "${{ vars.CONTENT_STORAGE_PREFIX }}" \
            --overwrite true

      - name: Upload media from assets
        run: |
          az storage blob upload-batch \
            --auth-mode login \
            --destination "${{ vars.CONTENT_STORAGE_CONTAINER }}" \
            --source assets \
            --destination-path images \
            --overwrite true

      - name: API verification gate
        if: ${{ vars.REQUIRE_API_VERIFICATION == 'true' }}
        run: |
          curl --fail "${{ vars.AZURE_API_BASE_URL }}/api/${{ vars.CONTENT_SITE_KEY }}/health"
          curl --fail "${{ vars.AZURE_API_BASE_URL }}/api/${{ vars.CONTENT_SITE_KEY }}/home"
